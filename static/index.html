*{box-sizing:border-box;margin:0;padding:0}
:root{

  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --blue:#1648A0;--blue2:#2563EB;--blue-light:#EFF6FF;--blue-mid:#DBEAFE;
  --red:#DC2626;--red-light:#FEF2F2;--red-mid:#FEE2E2;
  --amber:#D97706;--amber-light:#FFFBEB;--amber-mid:#FEF3C7;
  --green:#16A34A;--green-light:#F0FDF4;--green-mid:#DCFCE7;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.05);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
.serif{font-family:'DM Serif Display',serif}
.mono{font-family:'Fira Code',monospace;font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:4px;height:4px;background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow)}
.surface{background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.btn{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:6px 14px;font:500 12px 'Inter',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg3);border-color:var(--blue);color:var(--blue)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);border:1px solid var(--blue);color:#fff;border-radius:7px;padding:8px 18px;font:600 13px 'Inter',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover:not(:disabled){background:var(--blue2)}
.btn-primary:disabled{background:var(--border2);border-color:var(--border2);cursor:not-allowed}
.btn-ghost{background:none;border:none;color:var(--text2);border-radius:6px;padding:5px 10px;font:500 12px 'Inter',sans-serif;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.input{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font:13px 'Inter',sans-serif;width:100%;outline:none;transition:border .15s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,72,160,.1)}
.select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font:13px 'Inter',sans-serif;width:100%;outline:none;cursor:pointer}
.select:focus{border-color:var(--blue)}
textarea.input{resize:vertical;min-height:70px}
.tab-bar{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;cursor:pointer;font:500 12px 'Inter',sans-serif;border-bottom:2px solid transparent;color:var(--text3);white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;flex-shrink:0}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tag{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:1px 6px;font-size:11px;display:inline-block;white-space:nowrap}
.badge-urgent{background:var(--red-mid);color:var(--red);border:1px solid #FECACA;border-radius:5px;padding:1px 7px;font:600 11px 'Inter',sans-serif}
.badge-high{background:var(--amber-mid);color:var(--amber);border:1px solid #FDE68A;border-radius:5px;padding:1px 7px;font:600 11px 'Inter',sans-serif}
.badge-moderate{background:#FEF9C3;color:#A16207;border:1px solid #FEF08A;border-radius:5px;padding:1px 7px;font:600 11px 'Inter',sans-serif}
.badge-monitor{background:#E0F2FE;color:#0369A1;border:1px solid #BAE6FD;border-radius:5px;padding:1px 7px;font:600 11px 'Inter',sans-serif}
.badge-normal{background:var(--green-mid);color:var(--green);border:1px solid #BBF7D0;border-radius:5px;padding:1px 7px;font:600 11px 'Inter',sans-serif}
.fade{animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.organ-g{cursor:pointer;transition:all .2s;transform-origin:center}
.organ-g:hover{filter:drop-shadow(0 2px 6px rgba(22,72,160,.4))}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.container{max-width:1060px;margin:0 auto;padding:18px 16px}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.card-link{cursor:pointer;transition:box-shadow .15s,transform .15s}
.card-link:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.upload-zone{border:2px dashed var(--border2);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border .15s;background:var(--bg3)}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-light)}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);transition:width .4s}
.field-label{font:500 11px 'Inter',sans-serif;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.3px}
.section-hdr{font:600 11px 'Inter',sans-serif;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.tl-wrap{position:relative;padding-left:40px;padding-bottom:16px}
.tl-dot{position:absolute;left:10px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid;flex-shrink:0}
.tl-line{position:absolute;left:15px;top:15px;bottom:0;width:1px;background:var(--border)}
/* Compact grid */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.stat-val{font:700 24px 'Fira Code',monospace;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px}
/* Compact spacing */
.gap-8{gap:8px}
.gap-12{gap:12px}
.mb-10{margin-bottom:10px}
.mb-14{margin-bottom:14px}
.p-12{padding:12px}
.p-16{padding:16px}
/* Year group header for timeline */
.year-badge{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border-radius:20px;padding:3px 12px;font:600 12px 'Inter',sans-serif;margin-bottom:12px}

.history-row{display:grid;grid-template-columns:100px 1fr 80px 80px;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.history-row:hover{background:var(--bg3)}

.metric-pill:hover{border-color:var(--blue);background:var(--blue-light)}
.metric-pill.active{border-color:var(--blue);background:var(--blue-light)}

.settings-btn{position:fixed;bottom:18px;right:18px;width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 14px rgba(22,72,160,.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}

.api-indicator{position:fixed;bottom:70px;right:10px;font-size:10px;padding:3px 10px;border-radius:10px;z-index:200;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.3px;white-space:nowrap;cursor:pointer}
.api-ok{background:#DCFCE7;color:#16A34A;border:1px solid #BBF7D0}
.api-missing{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
